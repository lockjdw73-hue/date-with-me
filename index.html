<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>저랑 데이트 하실래요?</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #ffe6e6;
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
        }
        h1 { color: #ff3366; text-align: center; }
        .button-container { 
            position: relative; 
            width: 300px; 
            height: 100px; 
            text-align: center; 
            margin-top: 20px;
        }
        button {
            font-size: 20px; 
            padding: 10px 20px; 
            border: none;
            border-radius: 10px; 
            cursor: pointer; 
            color: white;
            font-weight: bold;
        }
        #yesBtn { background-color: #ff3366; margin-right: 20px; }
        #noBtn { background-color: #999; position: absolute; transition: 0.1s; }
        
        #successImg { display: none; width: 200px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1 id="title">저랑 데이트 하실래요? 🥺</h1>
    <img id="successImg" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMjQzZWEzOTQwM2Q2Y2JkMzE2MGRjZDc1ZTZlYmY1ZDc3ZmVhOGJjZCZlcD12MV9pbnRlcm5hbF9naWZzX2dpZklkJmN0PWc/MDJ9BlJzyyPju/giphy.gif" alt="행복한 짤">
    
    <div class="button-container" id="btnContainer">
        <button id="yesBtn" onclick="accept()">네!!</button>
        <button id="noBtn" onmouseover="moveNo()">싫어요</button>
    </div>

    <script>
        function moveNo() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - 100) - (window.innerWidth / 2) + 50;
            const y = Math.random() * (window.innerHeight - 100) - (window.innerHeight / 2) + 50;
            btn.style.transform = `translate(${x}px, ${y}px)`;
        }

        function accept() {
            document.getElementById('title').innerText = "와아아! 사랑해요! 💖";
            document.getElementById('btnContainer').style.display = 'none';
            document.getElementById('successImg').style.display = 'block';
        }
    </script>
</body>
</html>
